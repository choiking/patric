<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
      color: #333;
    }
    h1 { font-size: 15px; margin-bottom: 12px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 6px;
      background: #f5f5f5;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.on { background: #4CAF50; }
    .dot.off { background: #F44336; }
    .tabs-info {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    label { display: block; font-weight: 600; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .buttons { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-connect { background: #4CAF50; color: white; }
    .btn-disconnect { background: #F44336; color: white; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Patric Browser Relay</h1>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">Checking...</span>
  </div>
  <div class="tabs-info" id="tabsInfo"></div>
  <label for="relayUrl">Relay Server URL</label>
  <input type="text" id="relayUrl" placeholder="http://localhost:9223" />
  <div class="buttons">
    <button class="btn-connect" id="btnConnect">Connect</button>
    <button class="btn-disconnect" id="btnDisconnect">Disconnect</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
